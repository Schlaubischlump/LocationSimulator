name: Close Stale Issues and PRs

on:
  push:
    paths:
      - .github/workflows/stale.yml
    branches-ignore:
      - dependabot/**
  schedule:
    # Once every day at midnight UTC
    - cron: "0 0 * * *"
  issue_comment:

permissions: {}

defaults:
  run:
    shell: bash -xeuo pipefail {0}

concurrency:
  group: stale-issues
  cancel-in-progress: ${{ github.event_name != 'issue_comment' }}

jobs:
  stale:
    if: >
      github.event_name != 'issue_comment' || (
        contains(github.event.issue.labels.*.name, 'stale')
      )
    runs-on: ubuntu-slim
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Mark/Close Stale Issues and Pull Requests
        uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899
        with:
          days-before-stale: 7
          days-before-close: 3
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed if no further activity
            occurs.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had recent activity. It will be closed if no further
            activity occurs.
          exempt-issue-labels: "keep-open"
          exempt-pr-labels: "keep-open"
          delete-branch: true
